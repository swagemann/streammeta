└── requirements.txt
```

---

## Out of Scope (v1)

- Multi-user conflict resolution (optimistic concurrency via ADO API is sufficient)
- dbt compile/run from within the app
- Editing non-YAML dbt files (SQL, macros)
- Full manifest.json parsing for lineage
- Role-based access control within the app (rely on Databricks App permissions)

---

## Open Questions

1. **Tag convention** — confirm flat `tag = 'true'` vs delimiter split (`domain:finance` → `domain = 'finance'`), or support both?
2. **Model-to-table mapping** — rely on naming convention alone, or parse `manifest.json` from a dbt docs artifact for accuracy?
3. **Reviewers** — hardcoded defaults, or pull from ADO team membership API?
4. **Bulk edits** — v1 single-file only, or support multi-file atomic commits from the start?