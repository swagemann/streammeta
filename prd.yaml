| Page | Purpose |
|---|---|
| **Editor** (default) | Browse, edit, commit YAML files |
| **Tag Sync** | Bulk sync — select models, preview tag diff (YAML vs UC), apply |
| **Settings** | ADO connection config, UC catalog mapping, default reviewers, tag conventions |

