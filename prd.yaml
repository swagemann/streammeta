│   └── settings.py         # Configuration page
├── lib/
│   ├── yaml_parser.py      # ruamel.yaml wrapper, round-trip helpers
│   ├── uc_tag_sync.py      # Unity Catalog tag sync logic
│   ├── config.py           # Load config from env/secrets
