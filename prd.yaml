# PRD: dbt YAML Editor — Databricks App

## Problem

Our dbt YAML governance workflow currently runs as a local Streamlit app against a cloned ADO repo. This limits access to whoever has the repo cloned locally and blocks adoption by analysts and non-engineers. Additionally, dbt tags defined in YAML do not sync to Databricks Unity Catalog automatically — only descriptions do — creating metadata drift between dbt and UC.

## Solution

Rewrite the app as a centrally deployed **Databricks App** that uses the **Azure DevOps REST API** (`ado_git_client.py`) instead of local filesystem Git operations, and adds **Unity Catalog tag sync** as a first-class feature.

---

## Architecture

```
┌─────────────────────────────────────────────────────┐
│  Databricks App (Streamlit)                         │
│                                                     │
│  ┌──────────┐  ┌──────────┐  ┌───────────────────┐ │
│  │ YAML     │  │ ADO Git  │  │ UC Tag Sync       │ │
│  │ Editor   │──│ Client   │  │ (Databricks SQL)  │ │
│  │ UI       │  │ (REST)   │  │                   │ │
│  └──────────┘  └──────────┘  └───────────────────┘ │
│       │              │                │             │
└───────┼──────────────┼────────────────┼─────────────┘
        │              │                │
   st.session_state    │          Databricks SQL
                       │          Warehouse
                Azure DevOps
                Git REST API
```

### Key Dependencies

| Component | Purpose |
|---|---|
| `ado_git_client.py` | All Git operations via ADO REST API (read, branch, push, PR) |
| Databricks Secrets | Store ADO PAT (`scope: ado, key: pat`) |
| Databricks SQL Warehouse | Execute `ALTER TABLE SET TAGS` for UC sync |
| `databricks-sdk` | UC catalog/schema/table introspection and SQL execution |
| `ruamel.yaml` | YAML parsing that preserves comments and formatting |

---

## User Workflow

### 1. Browse & Select

- App loads → calls `client.list_yaml_files("/models")` → populates sidebar dropdown
- Dropdown shows full paths grouped by folder (e.g. `staging/`, `marts/`)
- User selects a file → app calls `client.get_file(path, branch)` → raw YAML loaded into session state
- Branch selector defaults to `main`, allows switching to any existing branch

### 2. View & Edit

The YAML is parsed with `ruamel.yaml` (preserves comments) and rendered as a structured form, NOT a raw text editor. Each model/source in the file gets a section with:

- **Name** — read-only display
- **Description** — `st.text_area`
- **Tags** — `st.multiselect` with existing tags as options + free-text entry
- **Meta** — key-value editor (optional, expandable)
- **Columns** — nested expanders, each with:
  - Description — `st.text_area`
  - Tags — `st.multiselect`
  - Tests — checklist (`not_null`, `unique`, `accepted_values`, custom) with parameter inputs
  - Meta — key-value editor

A "Raw YAML" toggle shows the rendered output for review before commit.

### 3. Commit & PR

- User clicks **Save** → app validates YAML (schema check + `ruamel.yaml` round-trip) 
- Prompts for: branch name (auto-suggested from file path), commit message, PR title
- Calls `client.edit_and_pr()` which: creates branch → pushes file → opens PR
- Displays PR link on success
- If branch already exists (WIP edits), pushes additional commits to the same branch

### 4. Tag Sync to Unity Catalog

After save (or via a dedicated **Sync Tags** button):

- App reads tags from the edited YAML
- Maps dbt model name → UC three-part table name (`catalog.schema.table`)
  - Mapping strategy: configurable in app settings, default convention is `{catalog}.{schema}.{model_name}`
  - Falls back to `manifest.json` lookup if available
- Executes SQL against the Databricks SQL warehouse:

```sql
-- Model-level tags
ALTER TABLE catalog.schema.table_name SET TAGS ('tag_name' = 'true');

-- Column-level tags  
ALTER TABLE catalog.schema.table_name ALTER COLUMN col_name SET TAGS ('pii' = 'true');
```

**Tag key-value convention:** dbt tags are flat strings. Map them as `tag_name = 'true'`. If a tag contains a colon (e.g. `domain:finance`), split into `key = value`.

