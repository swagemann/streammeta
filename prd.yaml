## Session State Design

All repo data lives in `st.session_state` — no disk I/O.

```python
st.session_state = {
    # ADO client (initialized once)
    "client": ADOGitClient(...),
    
    # Repo browsing
    "yaml_files": [...],           # cached file list
    "current_branch": "main",
    "selected_file": "/models/...",
    
    # Editing
    "raw_yaml": "...",             # original content from ADO
    "parsed_yaml": {...},          # ruamel.yaml parsed object
    "has_unsaved_changes": False,
    
    # Working branch for multi-file edits
    "working_branch": None,
    "pending_commits": [],
}
```

---

## Configuration

Stored as a YAML config file within the Databricks App deployment (or a Databricks secret for sensitive values).

```yaml
ado:
  org: "my-org"
  project: "my-project"  
  repo: "my-dbt-repo"
  default_branch: "main"
  # PAT pulled from Databricks Secrets at runtime

unity_catalog:
  default_catalog: "analytics"
  sql_warehouse_id: "abc123"
  model_to_table_map:
    # Optional explicit overrides
    stg_orders: "analytics.staging.stg_orders"
  naming_convention: "{catalog}.{schema}.{model_name}"

editor:
  default_reviewers: ["user@company.com"]
  branch_prefix: "yaml-edit/"
  tag_delimiter: ":"  # for splitting "domain:finance" → key:value
```

---

## YAML Parsing Rules

Use `ruamel.yaml` (not `PyYAML`) to preserve:
- Comments (inline and block)
- Key ordering
- Formatting and indentation style

Round-trip fidelity is critical — a save that changes only a description should produce a minimal diff, not reformat the entire file.

### Validation

Before commit, validate:
1. YAML is syntactically valid (round-trip parse)
2. Required fields present (`name` on models/columns)
3. No duplicate column names within a model
4. Tags are non-empty strings
5. Test parameters are valid (e.g. `accepted_values` has a `values` list)

---

## Error Handling

| Scenario | Behavior |
|---|---|
| ADO API auth failure | Surface error, prompt to check PAT in Databricks Secrets |
| Branch conflict (`ADOConflictError`) | Notify user, offer to re-fetch and retry |
| Branch already exists | Ask: reuse existing branch or create new? |
| YAML parse failure | Show error with line number, block commit |
| UC table not found for tag sync | Warn per-model, continue with others |
| SQL warehouse unavailable | Queue tag sync for retry, don't block YAML commit |

