## Databricks App Deployment

### `app.yaml`

```yaml
command: ["streamlit", "run", "app.py", "--server.port", "8501"]
env:
  - name: ADO_ORG
    value: "my-org"
  - name: ADO_PROJECT
    value: "my-project"
  - name: ADO_REPO
    value: "my-dbt-repo"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "abc123"
```

### Secrets

| Secret Scope | Key | Value |
|---|---|---|
| `ado` | `pat` | Azure DevOps PAT with Code (Read & Write) scope |

### Permissions

- ADO PAT needs: **Code (Read & Write)**, **Pull Request Threads (Read & Write)**
- Databricks service principal needs: SQL warehouse access, UC `USE CATALOG/SCHEMA`, `ALTER` on target tables

